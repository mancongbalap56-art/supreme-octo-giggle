<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CAPITALTOTO</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

/* BACKGROUND CASINO */
body{
height:100vh;
background:url("https://images.unsplash.com/photo-1596838132731-3301c3fd4317?auto=format&fit=crop&w=1200&q=80") center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
}

/* OVERLAY */
.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
backdrop-filter:blur(4px);
}

/* CONTAINER */
.container{
position:relative;
width:340px;
padding:30px;
text-align:center;
background:rgba(0,0,0,0.6);
border-radius:20px;
box-shadow:0 0 40px rgba(255,0,0,0.3);
}

/* TITLE */
.title{
font-size:42px;
font-weight:bold;
letter-spacing:2px;
margin-bottom:20px;
color:#ff0000;
text-shadow:0 0 15px red;
animation:glow 2s infinite alternate;
}

/* SUBTITLE */
.subtitle{
color:#ffd700;
font-size:20px;
margin-bottom:20px;
}

/* BUTTON */
.btn{
display:block;
width:100%;
padding:14px;
margin:10px 0;
border-radius:30px;
border:none;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.orange{
background:linear-gradient(#ffb347,#ff8c00);
}

.green{
background:#30ff00;
}

.blue{
background:#42d7ff;
}

.btn:hover{
transform:scale(1.07);
box-shadow:0 0 15px gold;
}

/* INFO BOX */
.info{
background:#111;
color:white;
padding:10px;
border-radius:20px;
margin-top:15px;
}

/* ANIMATION */

@keyframes glow{
from{
text-shadow:0 0 10px red;
}
to{
text-shadow:0 0 25px red;
}
}

</style>

</head>

<body>

<div class="overlay"></div>

<div class="container">

<div class="title">
CAPITALTOTO
</div>

<div class="subtitle">
SLOT GACOR MAXWIN
</div>

<button class="btn orange" onclick="login()">LOGIN</button>
<button class="btn orange" onclick="daftar()">DAFTAR</button>

<button class="btn orange">RTP GACOR</button>

<button class="btn green" onclick="whatsapp()">WHATSAPP</button>
<button class="btn green">GROUP WHATSAPP</button>

<button class="btn blue" onclick="telegram()">TELEGRAM</button>

<div class="info">
MINIMAL DEPOSIT 10.000
</div>

<button class="btn orange">
MINIMAL WITHDRAW 50.000
</button>

</div>

<script>

function login(){
window.open("https://hantam88.art");
}

function daftar(){
window.open("https://hantam88.art/jvtn");
}

function whatsapp(){
window.open("https://chat.whatsapp.com/E1757IaHJdMCwXm65hW8Hc?mode=gi_t");
}

function telegram(){
window.open("https://t.me/");
}

</script>

</body>
</html>
